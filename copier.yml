_min_copier_version: "9"

_subdirectory: template

_tasks:
  - >-
    {% if mode == "no-package" %}
    {{ _copier_python }} "{{ _copier_conf.src_path }}/scripts/post_render.py"
    --project-root .
    --package-mode no-package
    {% else %}
    {{ _copier_python }} "{{ _copier_conf.src_path }}/scripts/post_render.py"
    --project-root .
    --package-mode package
    --package-layout {{ layout }}
    {% endif %}

project:
  type: str
  help: "Project name, for example todo-cli"
  validator: >-
    {% if not (project | regex_search('^[a-z][a-z0-9-]+$')) %}
    project must match ^[a-z][a-z0-9-]+$
    {% endif %}

project_module:
  type: str
  default: "{{ project | replace('-', '_') }}"
  when: false

python:
  type: str
  help: "Python version"
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

mode:
  type: str
  help: "Should the project be a package?"
  default: "package"
  choices:
    - no-package
    - package

layout:
  type: str
  help: "Package project layout"
  default: "flat"
  choices:
    - flat
    - hexagonal
  when: "{{ mode == 'package' }}"

_answers_file: ".copier-answers.yml"
