_min_copier_version: "9"

_subdirectory: template

_tasks:
  - >-
    {% if mode == "no-package" %}
    {{ _copier_python }} "{{ _copier_conf.src_path }}/scripts/post_render.py"
    --project-root .
    --package-mode no-package
    {% else %}
    {{ _copier_python }} "{{ _copier_conf.src_path }}/scripts/post_render.py"
    --project-root .
    --package-mode package
    --package-layout {{ layout }}
    {% endif %}

project:
  type: str
  help: "Project name, for example todo-cli. This becomes the package name or script name."
  validator: >-
    {% if not (project | regex_search('^[a-z][a-z0-9-]+$')) %}
    project must match ^[a-z][a-z0-9-]+$
    {% endif %}

project_module:
  type: str
  default: "{{ project | replace('-', '_') }}"
  when: false

python:
  type: str
  help: "Target Python version for pyproject.toml, Ruff, and mypy."
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"

mode:
  type: str
  help: >-
    Project type.
    Choose no-package for a small script with main.py and argparse.
    Choose package for an installable CLI package with src/ layout, Typer, and a console entry point.
  default: "package"
  choices:
    "script: single main.py, argparse, no installable package": no-package
    "package: installable CLI package, Typer, console command": package

layout:
  type: str
  help: >-
    Package layout.
    Choose flat for a small CLI with one module-level command layer.
    Choose hexagonal when you want separate CLI, application, domain, and adapter layers.
  default: "flat"
  choices:
    "flat: simple src package for small CLIs": flat
    "hexagonal: layered CLI with application/domain/adapters": hexagonal
  when: "{{ mode == 'package' }}"

_answers_file: ".copier-answers.yml"
